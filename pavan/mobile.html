<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVerse - Explore the World of Movies</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #ffffff;
        }
        header {
            background-color: rgba(0, 0, 0, 0.8);
            padding: 1rem 5%;
            position: fixed;
            width: 90%;
            z-index: 1000;
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 600;
            color: #ff4d4d;
        }
        .nav-links {
            display: flex;
            align-items: center;
        }
        .nav-links a {
            color: #ffffff;
            text-decoration: none;
            margin-left: 1.5rem;
            transition: color 0.3s ease;
        }
        .nav-links a:hover {
            color: #ff4d4d;
        }
        .login-btn {
            background-color: #ff4d4d;
            color: #ffffff;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin-left: 1.5rem;
        }
        .login-btn:hover {
            background-color: #ff3333;
        }
        /* ... (rest of the CSS remains the same) ... */
    </style>
</head>

    <header>
        <nav>
